<style>

/* ===== 全站設定 ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f6f1ea;
    color:#3d3028;
    font-family:'Noto Sans TC', sans-serif;
    line-height:1.8;
}

/* ===== NAV（沿用首頁風格） ===== */

nav{
    background:#2a1f18;
    text-align:center;
    padding:20px;
    border-bottom:2px solid #c8a97e;
    position:sticky;
    top:0;
    z-index:999;
}

nav a{
    color:#f8f2eb;
    text-decoration:none;
    margin:0 22px;
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    letter-spacing:2px;
    transition:0.3s;
}

nav a:hover{
    color:#d8bc94;
}

/* ===== HERO ===== */

.hero{
    height:55vh;
    background:
    linear-gradient(rgba(20,15,10,0.55), rgba(20,15,10,0.55)),
    url('https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=1600&auto=format&fit=crop')
    center/cover no-repeat;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;
}

.hero h1{
    font-family:'Cormorant Garamond', serif;
    font-size:60px;
    letter-spacing:5px;
}

.hero p{
    margin-top:10px;
    letter-spacing:3px;
    color:#f2e7d7;
}

/* ===== ABOUT 內容 ===== */

.about{
    padding:100px 12%;
}

.about-container{
    display:flex;
    gap:70px;
    align-items:center;
    flex-wrap:wrap;
}

/* 左圖 */

.about-img{
    flex:1;
}

.about-img img{
    width:100%;
    border-radius:12px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* 右文 */

.about-text{
    flex:1;
}

.about-text h2{
    font-family:'Cormorant Garamond', serif;
    font-size:48px;
    margin-bottom:20px;
    color:#4b382f;
}

.about-text p{
    color:#6b564b;
    margin-bottom:15px;
    font-size:16px;
}

/* ===== 品牌理念 ===== */

.mission{
    background:#efe5d8;
    padding:90px 12%;
    text-align:center;
}

.mission h2{
    font-family:'Cormorant Garamond', serif;
    font-size:50px;
    margin-bottom:20px;
}

.mission p{
    max-width:800px;
    margin:auto;
    color:#6a564b;
}

/* ===== Footer ===== */

footer{
    background:#241912;
    color:#f7efe5;
    text-align:center;
    padding:40px;
    border-top:3px solid #c8a97e;
}

/* ===== RWD ===== */

@media(max-width:768px){

    .about-container{
        flex-direction:column;
    }

    .hero h1{
        font-size:40px;
    }

        </div>

        <div class="about-text">

            <h2>關於薰仔蛋糕店</h2>

            <p>
                薰仔蛋糕店誕生於對英式下午茶文化的熱愛，
                我們相信甜點不只是食物，而是一種生活儀式。
            </p>

            <p>
                每一顆蛋糕皆由職人手工製作，
                堅持使用天然食材與細緻工法，
                呈現最純粹的甜點風味。
            </p>

            <p>
                在這裡，每一口都是優雅與溫度的交會。

</section>

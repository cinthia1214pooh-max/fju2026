<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>聯絡我們｜薰仔蛋糕店</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== 基本 ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#f6f1ea;
    color:#3d3028;
    font-family:'Noto Sans TC', sans-serif;
    line-height:1.8;
}

/* ===== NAV ===== */
nav{
    background:#2a1f18;
    text-align:center;
    padding:18px;
    border-bottom:2px solid #c8a97e;
    position:sticky;
    top:0;
    z-index:999;
}

nav a{
    color:#f8f2eb;
    text-decoration:none;
    margin:0 16px;
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    letter-spacing:2px;
}

nav a:hover{color:#d8bc94;}

/* ===== HERO ===== */
.hero{
    height:40vh;
    background:
    linear-gradient(rgba(20,15,10,0.6), rgba(20,15,10,0.6)),
    url('https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=1600&auto=format&fit=crop')
    center/cover no-repeat;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero h1{
    font-family:'Cormorant Garamond', serif;
    font-size:54px;
    letter-spacing:5px;
}

.hero p{
    margin-top:10px;
    color:#f2e7d7;
}

/* ===== 內容 ===== */
.container{
    padding:80px 10%;
}

/* ===== 表單區 ===== */
.form-box{
    display:flex;
    gap:50px;
    flex-wrap:wrap;
}

/* 表單 */
form{
    flex:1;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

form h2{
    font-family:'Cormorant Garamond', serif;
    margin-bottom:20px;
    font-size:34px;
    color:#4b382f;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    color:#6a564b;
}

input, textarea{
    width:100%;
    padding:12px;
    border:1px solid #d8c6b3;
    border-radius:8px;
    font-family:'Noto Sans TC';
}

textarea{
    height:120px;
    resize:none;
}

button{
    margin-top:20px;
    padding:12px 25px;
    background:#5b4335;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    font-family:'Cormorant Garamond';
    letter-spacing:2px;
}

button:hover{
    background:#c8a97e;
    color:#2a1f18;
}

/* ===== 資訊區 ===== */
.info{
    flex:1;
}

.info h2{
    font-family:'Cormorant Garamond', serif;
    font-size:34px;
    margin-bottom:20px;
}

.info p{
    margin-bottom:12px;
    color:#6a564b;
}

/* ===== 地圖 ===== */
.map{
    margin-top:60px;
}

.map iframe{
    width:100%;
    height:350px;
    border:none;
    border-radius:15px;
}

/* ===== Footer ===== */
footer{
    background:#241912;
    color:#f7efe5;
    text-align:center;
    padding:40px;
    margin-top:80px;
    border-top:3px solid #c8a97e;
}

/* ===== RWD ===== */
@media(max-width:768px){
    .form-box{flex-direction:column;}
    .hero h1{font-size:38px;}
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="index.html">首頁</a>
    <a href="about.html">關於我們</a>
    <a href="products.html">商品介紹</a>
    <a href="hotcake.html">熱門蛋糕</a>
    <a href="news.html">最新消息</a>
    <a href="order.html">線上訂購</a>
    <a href="contact.html">聯絡我們</a>
    <a href="member.html">會員專區</a>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>聯絡我們</h1>
    <p>CONTACT US</p>
</div>

<!-- 內容 -->
<div class="container">

    <div class="form-box">

        <!-- 表單 -->
        <form>
            <h2>留下訊息 / Leave a Message</h2>

            <label>姓名 Name</label>
            <input type="text" placeholder="請輸入姓名">

            <label>電子信箱 Email</label>
            <input type="email" placeholder="example@gmail.com">

            <label>訊息 Message</label>
            <textarea placeholder="請輸入您的問題或建議..."></textarea>

            <button type="submit">送出訊息</button>
        </form>

        <!-- 資訊 -->
        <div class="info">
            <h2>聯絡資訊</h2>

            <p>📍 地址：台北市甜點街 123 號</p>
            <p>📞 電話：02-1234-5678</p>
            <p>📧 Email：cakehouse@gmail.com</p>
            <p>🕒 營業時間：10:00 - 20:00</p>

            <p>
                🍰 薰仔蛋糕店致力於提供英倫風手作甜點，
                歡迎任何合作或訂購洽詢。
            </p>
        </div>

    </div>

    <!-- 地圖 -->
    <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18..."></iframe>
    </div>

</div>

<!-- Footer -->
<footer>
© 11402餐旅資訊管理_第11組成果報告示範 薰仔蛋糕店 ｜ British Classic Dessert House </footer>

</body>
</html>
